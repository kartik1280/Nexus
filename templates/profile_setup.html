<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup | CodeMate AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/profile_setup.css') }}">
</head>



<body>

    <div class="cursor-glow"></div>

    <div class="page">
        <div class="wrap">

            <h1>Create Your Profile</h1>
            <p class="sub">Help us match you with the perfect teammates</p>

            <form class="card" method="POST" action="{{ url_for('profile_setup') }}">

                <div class="row">
                    <label>Name</label>
                    <input type="text" name="name" placeholder="Your full name">
                </div>

                <div class="row">
                    <label>Skills</label>
                    <input type="text" name="skills" placeholder="React, Python, ML">
                </div>

                <div class="row">
                    <label>Interests</label>
                    <input type="text" name="interests" placeholder="Hackathons, Startups">
                </div>

                <div class="row">
                    <label>Preferred Role</label>
                    <input type="text" name="roles" placeholder="Frontend, Backend">
                </div>

                <div class="row">
                    <label>Availability</label>
                    <select name="availability" required>
                        <option value="">Select Availability</option>
                        <option value="weekends">weekends</option>
                        <option value="evenings">evenings</option>
                        <option value="flexible">flexible</option>
                        <option value="full-time">full-time</option>
                    </select>
                </div>

                <div class="row">
                    <label>GitHub Link</label>
                    <input type="text" name="github" placeholder="https://github.com/username">
                </div>

                <div class="row">
                    <label>Commitment Level</label>
                    <input type="range" name="commitment" min="1" max="10">
                    <small>1 = Casual • 10 = Hardcore Builder</small>
                </div>

                <button type="submit" class="btn">Save Profile</button>

            </form>

        </div>
    </div>
    <div class="bg-grid"></div>
</body>

</html>
