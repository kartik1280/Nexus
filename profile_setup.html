<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup | SkillSwipe</title>
    <link rel="stylesheet" href="profile_setup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>



<body>

    <div class="cursor-glow"></div>

    <div class="page">
        <div class="wrap">

            <h1>Create Your Profile</h1>
            <p class="sub">Help us match you with the perfect teammates</p>

            <form class="card">

                <div class="row">
                    <label>Name</label>
                    <input type="text" id="name" placeholder="Your full name">
                </div>

                <div class="row">
                    <label>Course</label>
                    <input type="text" id="course" placeholder="B.Tech(specialization), BCA(specialization)">
                </div>

                <div class="row">
                    <label>Year</label>
                    <select id="year">
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                    </select>
                </div>

                <div class="row">
                    <label>Skills</label>
                    <input type="text" id="skills" placeholder="React, Python, ML, UI/UX...">

                </div>

                <div class="row">
                    <label>Experience</label>
                    <input type="text" id="experience" placeholder="Your Previous Projects">
                </div>

                <div class="row">
                    <label>Interests</label>
                    <input type="text" id="interests" placeholder="Hackathons, Research, Startups...">
                </div>

                <div class="row">
                    <label>Preferred Role</label>
                    <select id="role">
                        <option>Frontend Developer</option>
                        <option>Backend Developer</option>
                        <option>DBMS</option>
                        <option>UI/UX Designer</option>
                        <option>Full Stack Developer</option>
                    </select>
                </div>

                <div class="row">
                    <label>Availability</label>
                    <select id="availability">
                        <option>Weekends</option>
                        <option>Evenings</option>
                        <option>Flexible</option>
                        <option>Full-time</option>
                    </select>
                </div>

                <div class="row">
                    <label>GitHub Link</label>
                    <input type="url" id="github" placeholder="https://github.com/username">
                </div>

                <div class="profile-picture-section">

                    <div class="profile-pic-container" id="profilePicContainer">
                        <img id="previewImage" src="defaultPFP.jpeg" alt="Profile Preview">
                        <div class="edit-icon"><i class="fa-solid fa-pen"></i></div>
                    </div>

                    <input type="file" id="profilePic" accept="image/png, image/jpeg" style="display: none;">

                </div>

                <button type="submit" class="btn">Save Profile</button>

            </form>

        </div>
    </div>
    <div class="bg-grid"></div>
    <script src="profile_setup.js"></script>

</body>

</html>
